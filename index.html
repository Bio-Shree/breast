<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>BioStack | Breast Cancer RL Environment</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='12' fill='%2314293d'/%3E%3Cpath d='M13 38h9l5-17 7 26 6-19h11' fill='none' stroke='%23ffffff' stroke-width='5' stroke-linecap='round' stroke-linejoin='round'/%3E%3Ccircle cx='22' cy='22' r='5' fill='%2326a69a'/%3E%3Ccircle cx='44' cy='22' r='5' fill='%23f2a541'/%3E%3C/svg%3E" />
  <meta name="theme-color" content="#14293d" />
  <style>
    :root {
      color-scheme: light;
      --bg: #f4f7f9;
      --panel: #ffffff;
      --ink: #17202c;
      --muted: #667085;
      --line: #d7e0e8;
      --navy: #14293d;
      --navy-2: #203c57;
      --teal: #11796f;
      --teal-soft: #dff5f1;
      --blue: #2367a6;
      --blue-soft: #e4effa;
      --gold: #9a6400;
      --gold-soft: #fff1ca;
      --coral: #b64b35;
      --coral-soft: #fce7e1;
      --green: #16835f;
      --green-soft: #dcfae6;
      --red: #b42318;
      --red-soft: #fde8e7;
      --shadow: 0 16px 42px rgba(20, 41, 61, 0.1);
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--ink);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
      line-height: 1.45;
    }

    button,
    select {
      font: inherit;
    }

    .app {
      min-height: 100vh;
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 20;
      background: rgba(244, 247, 249, 0.94);
      border-bottom: 1px solid var(--line);
      backdrop-filter: blur(18px);
    }

    .topbar-inner {
      width: min(1240px, calc(100% - 32px));
      margin: 0 auto;
      padding: 14px 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 250px;
    }

    .brand-mark {
      width: 42px;
      height: 42px;
      border-radius: 10px;
      background: transparent;
      display: grid;
      place-items: center;
      box-shadow: 0 10px 28px rgba(20, 41, 61, 0.2);
      flex: 0 0 auto;
    }

    .brand-mark svg {
      width: 42px;
      height: 42px;
    }

    .brand strong {
      display: block;
      font-size: 15px;
      line-height: 1.12;
    }

    .brand span {
      display: block;
      margin-top: 2px;
      color: var(--muted);
      font-size: 12px;
    }

    .tabs {
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-end;
      gap: 8px;
    }

    .tab {
      border: 1px solid var(--line);
      background: #fff;
      color: var(--muted);
      border-radius: 8px;
      padding: 8px 12px;
      min-height: 38px;
      font-size: 13px;
      font-weight: 750;
      cursor: pointer;
      transition: background 160ms ease, border-color 160ms ease, color 160ms ease;
    }

    .tab[aria-selected="true"],
    .tab:hover {
      color: var(--teal);
      background: var(--teal-soft);
      border-color: #9bd8ce;
    }

    main {
      width: min(1240px, calc(100% - 32px));
      margin: 0 auto;
      padding: 30px 0 54px;
    }

    .view {
      display: none;
    }

    .view.active {
      display: block;
    }

    .hero {
      display: grid;
      grid-template-columns: minmax(0, 1.32fr) minmax(320px, 0.68fr);
      gap: 22px;
      align-items: stretch;
      margin-bottom: 30px;
    }

    .hero-copy {
      background: var(--navy);
      color: #fff;
      border-radius: 8px;
      padding: 30px;
      min-height: 410px;
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      box-shadow: var(--shadow);
      overflow: hidden;
      position: relative;
    }

    .hero-copy::after {
      content: "";
      position: absolute;
      right: -70px;
      bottom: -72px;
      width: 260px;
      height: 260px;
      border-radius: 50%;
      border: 42px solid rgba(255, 255, 255, 0.07);
      pointer-events: none;
    }

    .eyebrow {
      position: relative;
      z-index: 1;
      margin: 0 0 12px;
      color: #9de0d7;
      font-size: 12px;
      font-weight: 850;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    h1 {
      position: relative;
      z-index: 1;
      margin: 0;
      max-width: 850px;
      font-size: clamp(32px, 5vw, 58px);
      line-height: 1.02;
      letter-spacing: 0;
    }

    h2,
    h3,
    p {
      margin: 0;
    }

    .hero-copy .lead {
      position: relative;
      z-index: 1;
      margin-top: 15px;
      max-width: 820px;
      color: #d7e7f5;
      font-size: 17px;
    }

    .badge-row {
      position: relative;
      z-index: 1;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 20px;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      min-height: 28px;
      border-radius: 999px;
      padding: 5px 10px;
      font-size: 12px;
      font-weight: 800;
      border: 1px solid transparent;
    }

    .badge.teal {
      color: #dff5f1;
      background: rgba(17, 121, 111, 0.32);
      border-color: rgba(157, 224, 215, 0.42);
    }

    .badge.gold {
      color: #ffe9ae;
      background: rgba(154, 100, 0, 0.32);
      border-color: rgba(255, 233, 174, 0.4);
    }

    .badge.blue {
      color: #d5eaff;
      background: rgba(35, 103, 166, 0.35);
      border-color: rgba(213, 234, 255, 0.4);
    }

    .panel,
    .metric,
    .mini-card,
    .task-card,
    .reward-card,
    .table-panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
    }

    .panel {
      padding: 20px;
      margin-bottom: 30px;
    }

    .status-panel {
      padding: 20px;
      min-height: 410px;
      height: 100%;
      margin-bottom: 0;
      display: grid;
      gap: 12px;
      align-content: stretch;
    }

    .status-line {
      border-bottom: 1px solid var(--line);
      padding-bottom: 12px;
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: center;
    }

    .status-line:last-child {
      border-bottom: 0;
      padding-bottom: 0;
    }

    .status-line span {
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
    }

    .status-line strong {
      text-align: right;
      font-size: 15px;
      line-height: 1.25;
    }

    .section-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 22px;
      margin-bottom: 20px;
    }

    .section-head h2 {
      font-size: 22px;
      line-height: 1.18;
    }

    .section-head p {
      margin-top: 6px;
      max-width: 760px;
      color: var(--muted);
      font-size: 14px;
    }

    .compact-head {
      margin-top: 4px;
      margin-bottom: 14px;
    }

    .grid-3 + .compact-head,
    .task-grid + .compact-head {
      margin-top: 28px;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      white-space: nowrap;
      min-height: 30px;
      border-radius: 999px;
      padding: 5px 10px;
      font-size: 12px;
      font-weight: 850;
      color: var(--blue);
      background: var(--blue-soft);
      border: 1px solid #bad6ef;
    }

    .metrics-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 18px;
      margin-bottom: 30px;
    }

    .metric {
      min-height: 130px;
      padding: 16px;
      display: grid;
      gap: 10px;
      align-content: space-between;
    }

    .metric span {
      color: var(--muted);
      font-size: 12px;
      font-weight: 850;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .metric strong {
      display: block;
      font-size: 30px;
      line-height: 1;
    }

    .metric small {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.35;
    }

    .metric.best {
      border-color: #97d8ce;
      background: linear-gradient(180deg, #ffffff 0%, #eefaf7 100%);
    }

    .metric.best strong {
      color: var(--teal);
    }

    .metric.lift {
      border-color: #ead58b;
      background: linear-gradient(180deg, #ffffff 0%, #fff7df 100%);
      position: relative;
    }

    .metric.lift span,
    .metric.lift strong {
      color: var(--gold);
    }

    .grid-2 {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
      gap: 24px;
      margin-bottom: 30px;
    }

    .grid-3 {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 22px;
      margin-bottom: 30px;
    }

    .overview-grid {
      align-items: stretch;
    }

    .mini-card {
      padding: 16px;
      min-height: 156px;
    }

    .overview-card {
      display: flex;
      flex-direction: column;
      gap: 8px;
      min-height: 218px;
      height: 100%;
      width: 100%;
    }

    .overview-card p {
      min-height: 0;
    }

    .overview-card strong {
      margin-top: auto;
    }

    .mini-card h3 {
      font-size: 16px;
      line-height: 1.2;
      margin-bottom: 8px;
    }

    .mini-card p,
    .reward-card p,
    .task-card p {
      color: var(--muted);
      font-size: 14px;
    }

    .mini-card strong {
      display: block;
      margin-top: 0;
      font-size: 16px;
      line-height: 1.28;
      border-radius: 8px;
      padding: 9px 11px;
      border: 1px solid transparent;
      width: 100%;
      min-height: 54px;
      display: flex;
      align-items: center;
    }

    .mini-card strong.highlight-teal {
      color: var(--teal);
      background: var(--teal-soft);
      border-color: #a7ddd5;
    }

    .mini-card strong.highlight-blue {
      color: var(--blue);
      background: var(--blue-soft);
      border-color: #bad6ef;
    }

    .mini-card strong.highlight-gold {
      color: var(--gold);
      background: var(--gold-soft);
      border-color: #ead58b;
    }

    #view-rewards .mini-card strong {
      color: var(--teal);
      background: var(--teal-soft);
      border-color: #a7ddd5;
      margin-top: 10px;
    }

    #view-trajectory .mini-card strong {
      color: var(--teal);
      background: var(--teal-soft);
      border-color: #a7ddd5;
      margin-top: auto;
    }

    .chart-grid {
      display: grid;
      grid-template-columns: minmax(0, 1.05fr) minmax(0, 0.95fr);
      gap: 24px;
      margin-bottom: 30px;
    }

    canvas {
      width: 100%;
      height: 330px;
      display: block;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
    }

    .chart-panel {
      min-width: 0;
    }

    .legend {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 12px;
      color: var(--muted);
      font-size: 12px;
    }

    .legend span {
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .dot {
      width: 11px;
      height: 11px;
      border-radius: 50%;
      display: inline-block;
      background: var(--teal);
    }

    .dot.blue {
      background: var(--blue);
    }

    .dot.gold {
      background: var(--gold);
    }

    .dot.coral {
      background: var(--coral);
    }

    .table-panel {
      overflow-x: auto;
      margin-bottom: 30px;
      background: #fff;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 760px;
      font-size: 13px;
    }

    th,
    td {
      padding: 12px 12px;
      border-bottom: 1px solid var(--line);
      text-align: left;
      vertical-align: top;
    }

    th {
      color: var(--muted);
      background: #f8fafc;
      font-size: 12px;
      font-weight: 850;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    tr:last-child td {
      border-bottom: 0;
    }

    .result-table tbody tr {
      background: #fff;
    }

    .result-table .key-row td {
      border-top: 2px solid #a7ddd5;
      border-bottom: 2px solid #a7ddd5;
      background: #fbfffd;
    }

    .table-best {
      color: var(--teal);
      background: #eefaf7;
      font-weight: 850;
    }

    .table-lift {
      color: var(--gold);
      background: #fff7df;
      font-weight: 850;
    }

    .safety-cell {
      color: var(--teal);
      font-weight: 800;
    }

    .progress-row {
      display: grid;
      gap: 13px;
      margin-top: 4px;
    }

    .progress-item {
      display: grid;
      grid-template-columns: 156px minmax(0, 1fr) 76px;
      gap: 12px;
      align-items: center;
      font-size: 13px;
    }

    .bar-track {
      height: 12px;
      border-radius: 999px;
      background: #edf2f7;
      overflow: hidden;
      border: 1px solid var(--line);
    }

    .bar {
      height: 100%;
      border-radius: 999px;
      background: var(--teal);
    }

    .bar.blue {
      background: var(--blue);
    }

    .bar.gold {
      background: var(--gold);
    }

    .bar.coral {
      background: var(--coral);
    }

    .accordion {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      box-shadow: var(--shadow);
      margin-bottom: 22px;
      overflow: hidden;
    }

    .accordion summary {
      min-height: 58px;
      padding: 16px 18px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      cursor: pointer;
      color: var(--ink);
      font-weight: 850;
      list-style: none;
    }

    .accordion summary::-webkit-details-marker {
      display: none;
    }

    .accordion summary::after {
      content: "+";
      width: 28px;
      height: 28px;
      border-radius: 8px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: var(--teal);
      background: var(--teal-soft);
      border: 1px solid #a7ddd5;
      flex: 0 0 auto;
    }

    .accordion[open] summary::after {
      content: "-";
    }

    .accordion-body {
      padding: 0 18px 18px;
    }

    .accordion-body > :last-child {
      margin-bottom: 0;
    }

    .compare-table {
      min-width: 680px;
    }

    .reward-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 22px;
    }

    .reward-card {
      padding: 17px;
      min-height: 238px;
    }

    .reward-card code {
      display: inline-block;
      max-width: 100%;
      margin-bottom: 11px;
      padding: 5px 8px;
      border-radius: 6px;
      color: var(--blue);
      background: var(--blue-soft);
      font-weight: 850;
      white-space: normal;
      overflow-wrap: anywhere;
    }

    .reward-card h3 {
      margin-bottom: 8px;
      font-size: 16px;
    }

    .reward-card .formula {
      margin-top: 12px;
      color: var(--ink);
      font-size: 13px;
      font-weight: 750;
    }

    .task-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 22px;
      margin-bottom: 30px;
    }

    .task-card {
      padding: 17px;
    }

    .task-card h3 {
      font-size: 16px;
      margin-bottom: 8px;
    }

    .task-list {
      list-style: none;
      padding: 0;
      margin: 13px 0 0;
    }

    .task-list li {
      display: grid;
      grid-template-columns: 46px minmax(0, 1fr);
      gap: 9px;
      padding: 8px 0;
      border-bottom: 1px solid var(--line);
      font-size: 13px;
    }

    .task-list li:last-child {
      border-bottom: 0;
    }

    .task-id {
      color: var(--teal);
      font-weight: 850;
    }

    .action-space {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
    }

    .action-chip {
      min-height: 88px;
      border: 1px solid var(--line);
      background: #fff;
      border-radius: 8px;
      padding: 9px 10px;
      color: var(--ink);
      overflow-wrap: anywhere;
    }

    .action-chip code {
      display: block;
      margin-bottom: 6px;
      color: var(--teal);
      font-size: 12px;
      font-weight: 850;
      white-space: normal;
    }

    .action-chip span {
      display: block;
      color: var(--muted);
      font-size: 12px;
      font-weight: 650;
      line-height: 1.35;
    }

    .trajectory-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 18px;
      margin-bottom: 30px;
    }

    .trajectory-card {
      min-height: 220px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .trajectory-card .step-tag {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 30px;
      height: 30px;
      border-radius: 8px;
      color: var(--teal);
      background: var(--teal-soft);
      border: 1px solid #a7ddd5;
      font-size: 13px;
      font-weight: 850;
    }

    .trajectory-card p {
      color: var(--muted);
      font-size: 14px;
    }

    .trajectory-table {
      min-width: 820px;
    }

    .trajectory-table td:first-child {
      font-weight: 850;
      color: var(--teal);
    }

    .trajectory-example {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      box-shadow: var(--shadow);
      margin-bottom: 18px;
      overflow: hidden;
    }

    .trajectory-example summary {
      min-height: 64px;
      padding: 16px 18px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
      cursor: pointer;
      list-style: none;
    }

    .trajectory-example summary::-webkit-details-marker {
      display: none;
    }

    .trajectory-example summary::after {
      content: "+";
      width: 30px;
      height: 30px;
      border-radius: 8px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: var(--teal);
      background: var(--teal-soft);
      border: 1px solid #a7ddd5;
      font-weight: 850;
      flex: 0 0 auto;
    }

    .trajectory-example[open] summary::after {
      content: "-";
    }

    .example-title {
      display: grid;
      gap: 4px;
    }

    .example-title strong {
      color: var(--ink);
      font-size: 16px;
      line-height: 1.25;
    }

    .example-status {
      border: 1px solid #bad6ef;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: var(--blue-soft);
      font-size: 12px;
      font-weight: 850;
      white-space: nowrap;
    }

    .trajectory-example-body {
      padding: 0 18px 18px;
    }

    .trajectory-detail-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 16px;
    }

    .trajectory-detail {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 15px;
      background: #fff;
      min-height: 156px;
    }

    .trajectory-detail.wide {
      grid-column: 1 / -1;
    }

    .trajectory-detail h3 {
      margin-bottom: 8px;
      color: var(--ink);
      font-size: 15
